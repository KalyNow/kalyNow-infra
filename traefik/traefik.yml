# Traefik static configuration for local development
# https://doc.traefik.io/traefik/

# Global settings
global:
  checkNewVersion: false
  sendAnonymousUsage: false

# API and dashboard
api:
  dashboard: true
  insecure: true   # OK for local dev; disable in production

# Entry points
entryPoints:
  web:
    address: ":80"

# Providers
providers:
  # Discover services via Docker labels
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: kalyNow

# Logging
log:
  level: INFO

accessLog: {}
