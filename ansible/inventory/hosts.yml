---
# ─── Nomad cluster inventory ────────────────────────────────────────────────
#
# ✏️  To change a server or add/remove clients: edit cluster.yml ONLY.
#     The ansible_host values here reference nomad_server_ip / nomad_clients_ips
#     defined in cluster.yml — Ansible resolves them automatically at runtime.
#
# To add a client node:
#   1. Add its IP to nomad_clients_ips in cluster.yml  (e.g.  client3: "X.X.X.X")
#   2. Add the alias here under nomad_clients           (e.g.  client3:)
#   Done.

all:
  children:

    # ── Server node(s) ────────────────────────────────────────────────────────
    # One server for a single-region cluster.
    # To add more: duplicate the host block, update bootstrap_expect in cluster.yml.
    nomad_servers:
      hosts:
        server1:
          ansible_host: "{{ nomad_server_ip }}"

    # ── Client nodes ──────────────────────────────────────────────────────────
    # Each ansible_host is looked up from nomad_clients_ips in cluster.yml.
    nomad_clients:
      hosts:
        client1:
          ansible_host: "{{ nomad_clients_ips['client1'] }}"
        # client2:
        #   ansible_host: "{{ nomad_clients_ips['client2'] }}"
        # client3:
        #   ansible_host: "{{ nomad_clients_ips['client3'] }}"

    # ── Union group used by common tasks ──────────────────────────────────────
    nomad_all:
      children:
        nomad_servers:
        nomad_clients:

    # ── TLS cert generation + ACL bootstrap (always the first server node) ───
    tls_generator:
      hosts:
        server1:
          ansible_host: "{{ nomad_server_ip }}"
