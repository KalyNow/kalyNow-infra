---
# ─── Role: nomad_volumes ─────────────────────────────────────────────────────
#
# Creates host volume directories on every node and sets correct ownership.
# These paths must exist before Nomad tries to schedule jobs that use them.

- name: "Volumes | Create host volume directories"
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop: "{{ nomad_volumes }}"
  loop_control:
    label: "{{ item.path }}"
