# Redis configuration for local development
# https://redis.io/docs/management/config/

# Network
bind 0.0.0.0
protected-mode yes
port 6379

# Persistence (RDB snapshot)
save 3600 1
save 300 100
save 60 10000
dbfilename dump.rdb
dir /data

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile ""
